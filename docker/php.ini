; Ajustes de PHP para producción (Empire Systems CRM en Railway).

; --- Límites de subida (coherentes con client_max_body_size de Nginx) ---
upload_max_filesize = 32M
post_max_size = 32M
memory_limit = 256M
max_execution_time = 60

; --- Zona horaria: España ---
date.timezone = Europe/Madrid

; --- OPcache: rendimiento en producción ---
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; El código no cambia en runtime (imagen inmutable): no revalidar en cada request.
opcache.validate_timestamps = 0

; --- Errores: al log, nunca a pantalla en producción ---
display_errors = Off
log_errors = On
error_log = /dev/stderr
expose_php = Off
