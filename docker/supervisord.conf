[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/run/supervisord.pid

# --- PHP-FPM ---------------------------------------------------------------
[program:php-fpm]
command=php-fpm --nodaemonize
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- Nginx -----------------------------------------------------------------
[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- Worker de cola ---------------------------------------------------------
# La app usa QUEUE_CONNECTION=database. Procesa jobs (envío de mails, PDFs, etc.).
# Si preferís correr la cola en un servicio Railway aparte, poné autostart=false.
[program:queue]
command=php /app/artisan queue:work --sleep=3 --tries=3 --max-time=3600 --timeout=90
autostart=true
autorestart=true
priority=30
stopwaitsecs=95
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- Scheduler --------------------------------------------------------------
# Reemplaza al cron de hosting compartido: ejecuta los comandos programados de
# bootstrap/app.php (purgas RGPD de logs/Facturae/geo y alertas de jornada).
# schedule:work es un proceso de larga vida que dispara schedule:run cada minuto.
# OJO: si escalás a varias réplicas, correlo en UNA sola (autostart=false aquí y
# un servicio Railway aparte) para no duplicar las tareas diarias.
[program:scheduler]
command=php /app/artisan schedule:work
autostart=true
autorestart=true
priority=40
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
